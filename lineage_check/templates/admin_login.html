{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div style="max-width:400px; margin:4rem auto; padding:2rem; background:#fff; border:1px solid #ddd; border-radius:8px;">
  <h2 style="color:#1a3a8f; margin-bottom:1.5rem;">Admin Access</h2>
  {% if error %}
  <div style="background:#fee; border:1px solid #c00; padding:.75rem 1rem; border-radius:4px; margin-bottom:1rem; color:#c00;">{{ error }}</div>
  {% endif %}
  <form method="post">
    <label style="display:block; font-weight:600; margin-bottom:.5rem;">Password</label>
    <input type="password" name="password" autofocus
           style="width:100%; padding:.6rem; border:1px solid #ccc; border-radius:4px; font-size:1rem; box-sizing:border-box;">
    <button type="submit"
            style="margin-top:1rem; width:100%; background:#1a3a8f; color:#fff; border:none; padding:.75rem; border-radius:4px; font-size:1rem; cursor:pointer;">
      Sign In
    </button>
  </form>
</div>
{% endblock %}
